<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flood Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:white;
overflow:hidden;
text-align:center;
}

.wave{
position:absolute;
bottom:0;
width:200%;
height:300px;
background:linear-gradient(to top,#b3e5ff,#ffffff);
border-radius:50%;
animation:wave 8s infinite linear;
}

@keyframes wave{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

.container{
position:relative;
z-index:2;
padding-top:100px;
}

h1{
font-size:40px;
color:#003366;
}

.start-btn{
margin-top:40px;
padding:20px 50px;
font-size:22px;
border:none;
border-radius:50px;
background:rgba(255,255,255,0.3);
backdrop-filter:blur(15px);
box-shadow:0 8px 32px rgba(0,0,0,0.2);
cursor:pointer;
transition:0.3s;
}

.start-btn:hover{
transform:scale(1.1);
background:#00bfff;
color:white;
}

.team{
margin-top:80px;
display:flex;
justify-content:center;
gap:40px;
}

.avatar{
font-size:70px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

footer{
margin-top:80px;
font-size:18px;
color:#555;
}
</style>
</head>

<body>

<div class="container">
<h1>Flood Management System</h1>

<button class="start-btn" onclick="location.href='weather.html'">
START EXPLORING
</button>

<div class="team">
<div>
<div class="avatar">🧔</div>
Shaurya
</div>
<div>
<div class="avatar">👩</div>
Anjali
</div>
<div>
<div class="avatar">🧔</div>
Yashaswa
</div>
<div>
<div class="avatar">🧔</div>
Jatin
</div>
</div>

<footer>
Developed by: Shaurya, Anjali, Yashaswa & Jatin
</footer>

</div>

<div class="wave"></div>

</body>
</html>
