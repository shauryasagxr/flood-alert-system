<!DOCTYPE html>

<html>
<head>
    <title>Flood Risk Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard">

    <div class="card">

        <h2 id="cityName"></h2>

        <div class="icon" id="weatherIcon">☁️</div>

        <h1 id="riskText"></h1>

        <div class="progress">
            <div class="bar" id="riskBar"></div>
        </div>

        <div class="details" id="details"></div>

    </div>

    <script>
        const apiKey = "1c7de98d8db631d95b78569e8423330b";

        let city = localStorage.getItem("city");
        document.getElementById("cityName").innerText = "Flood Risk in " + city;

        fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`)
        .then(response => response.json())
        .then(data => {

            let weather = data.weather[0].main;
            let rain = data.rain ? data.rain["1h"] || 0 : 0;
            let humidity = data.main.humidity;
            let temp = data.main.temp;
            let wind = data.wind.speed;

            let risk = "Low";
            let width = "30%";
            let color = "#00ff88";
            let icon = "☀️";

            if(weather.includes("Rain")) icon = "🌧️";
            if(weather.includes("Cloud")) icon = "☁️";

            if (rain > 10) {
                risk = "High";
                width = "90%";
                color = "#ff4d4d";
            } else if (rain > 5) {
                risk = "Medium";
                width = "60%";
                color = "#ffcc00";
            }

            document.getElementById("weatherIcon").innerText = icon;
            document.getElementById("riskText").innerText = risk + " Risk ↑";
            document.getElementById("riskText").className = risk.toLowerCase();

            let bar = document.getElementById("riskBar");
            bar.style.width = width;
            bar.style.background = color;

            document.getElementById("details").innerHTML = `
                <div class="detail-box">🌡 Temp<br><b>${temp}°C</b></div>
                <div class="detail-box">💧 Humidity<br><b>${humidity}%</b></div>
                <div class="detail-box">🌧 Rain (1h)<br><b>${rain} mm</b></div>
                <div class="detail-box">💨 Wind<br><b>${wind} m/s</b></div>
            `;
        });
    </script>

</body>
